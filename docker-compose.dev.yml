# compose configuration override for development purposes.
services:
  backend:
    build:
      target: development
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      target: development
    ports:
      - "5173:5173" # uses vite live-reload
    volumes:
      - ./frontend:/app
      - /app/node_modules