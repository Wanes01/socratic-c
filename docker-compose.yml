services:
  web-app:
    command: npm run dev
    build: .
    container_name: socratic-tutor-app
    working_dir: /app/backend
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app/backend
      - ./frontend:/app/frontend
      - ./exercises:/app/exercises
      - /app/backend/node_modules
      - /app/frontend/node_modules
    environment:
      - EXERCISES_DIR=/app/exercises
      - OLLAMA_URL=http://ollama-service:11434
      - OLLAMA_MODEL=qwen2.5-coder:3b
      - EXEC_MEMORY_LIMIT_MB=128 # expressed in megabytes
      - EXEC_TIMEOUT_SEC=90 # expressed in seconds
    networks:
      - llm-network
    depends_on:
      - ollama-service
    env_file:
      - .env

  ollama-service:
    image: ollama/ollama:latest
    container_name: socratic-ollama
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - llm-network

networks:
  llm-network:
    driver: bridge

volumes:
  ollama_data: