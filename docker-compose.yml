services:
  web-app:
    command: npm run dev
    build: .
    container_name: socratic-tutor-app
    working_dir: /app/backend
    ports:
      - "5000:5000"
    volumes:
      - ./:/app
      - /app/backend/node_modules
      - /app/frontend/node_modules
    environment:
      - EXERCISES_DIR=/app/exercises
      - OLLAMA_URL=http://ollama-service:11434
      - OLLAMA_MODEL=qwen2.5-coder:3b
    networks:
      - llm-network
    depends_on:
      - ollama-service

  ollama-service:
    image: ollama/ollama:latest
    container_name: socratic-ollama
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - llm-network

networks:
  llm-network:
    driver: bridge

volumes:
  ollama_data: