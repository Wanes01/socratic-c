services:
  web-app:
    command: npm run dev
    build: .
    container_name: socratic-tutor-app
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app          # monta il sorgente del backend
      - ./exercises:/app/exercises
      - ./frontend/dist:/app/public   # dist del frontend (buildato separatamente)
      - /app/node_modules       # preserva node_modules del backend
    networks:
      - llm-network
    depends_on:
      - ollama-service

  ollama-service:
    image: ollama/ollama:latest
    container_name: socratic-ollama
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - llm-network

networks:
  llm-network:
    driver: bridge

volumes:
  ollama_data: